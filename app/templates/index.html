<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ИИ-интервьюер Смены</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="layout">
    <section class="hero">
      <h1>Найди свою смену за 7 минут</h1>
      <p>Игровой ИИ-интервьюер определит твой профиль и покажет лучшие смены или умный план Б.</p>
      <button id="startBtn" class="btn-primary">Начать квест</button>
    </section>

    <section id="chatCard" class="card hidden">
      <div class="progress-wrap">
        <div id="progressLabel">0/0</div>
        <div class="progress"><span id="progressBar"></span></div>
      </div>
      <h2 id="questionText">...</h2>
      <div id="options" class="options"></div>
      <div class="hint">Можно выбрать несколько вариантов через запятую там, где это уместно.</div>
    </section>

    <section id="resultCard" class="card hidden"></section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
